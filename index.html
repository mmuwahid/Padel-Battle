<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0d14" />
    <link rel="manifest" href="/manifest.json" />
    <!-- S073: SVG icon prioritized so home-screen + apple-touch + tab favicon
         all render the new green orb design without needing PNG regen. PNG
         fallbacks kept for older clients. -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon-precomposed" href="/icons/icon-192.png" />
    <!-- S089 #115: preload Syne (the splash wordmark font, = var(--font)) so the
         single static splash renders its wordmark without a FOUT flash. -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" as="style" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700;800;900&family=Outfit:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <title>PadelHub</title>
    <meta name="description" content="Track padel matches, ELO rankings, partnerships and tournaments with your friends" />
    <!-- OG tags for link previews (GN-18 + S070 Issue #69 hygiene pass).
         Cache-buster on og:image forces WhatsApp/iMessage/Slack to re-fetch
         the preview after S070 ship; bump the ?v= each time the icon asset
         changes. og:site_name + og:locale + og:image:alt help link-preview
         scrapers fall back gracefully when image fetch is slow. -->
    <meta property="og:site_name" content="PadelHub" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="PadelHub — Track Your Padel Game" />
    <meta property="og:description" content="Log matches, track ELO rankings, and discover your best partnerships." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://padel-battle.vercel.app" />
    <meta property="og:image" content="https://padel-battle.vercel.app/og-image.png?v=199" />
    <meta property="og:image:secure_url" content="https://padel-battle.vercel.app/og-image.png?v=199" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PadelHub — green orb logo on dark background" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@padelhub" />
    <meta name="twitter:title" content="PadelHub — Track Your Padel Game" />
    <meta name="twitter:description" content="Log matches, track ELO rankings, and discover your best partnerships." />
    <meta name="twitter:image" content="https://padel-battle.vercel.app/og-image.png?v=199" />
    <meta name="twitter:image:alt" content="PadelHub — green orb logo on dark background" />
  </head>
  <body>
    <!-- S073: green 3D orb hub + 6 satellite orbs orbiting around it (Issue
         #90 — brand color is green, not gold). Mirrors <PadelHubMark> in
         src/components/icons.jsx so static + React splashes render identical
         artwork (Lesson #98). -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(74,222,128,0.10), transparent 60%), #0d0d14;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30vh 32px 0;font-family:'Syne',system-ui,sans-serif">
      <svg width="140" height="140" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;filter:drop-shadow(0 0 24px rgba(74,222,128,0.34))">
        <defs>
          <radialGradient id="s-orb" cx="36%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#eafff3"/><stop offset="42%" stop-color="#4ade80"/><stop offset="100%" stop-color="#0f3d22"/>
          </radialGradient>
          <radialGradient id="s-aura" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.42"/><stop offset="55%" stop-color="#4ade80" stop-opacity="0.13"/><stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle class="splash-aura" cx="50" cy="50" r="46" fill="url(#s-aura)"/>
        <ellipse cx="50" cy="50" rx="40" ry="17" fill="none" stroke="#4ade80" stroke-width="1.8" opacity="0.5" transform="rotate(-28 50 50)"/>
        <circle class="splash-orb" cx="50" cy="50" r="20" fill="url(#s-orb)"/>
        <ellipse cx="43" cy="43" rx="6.5" ry="4.4" fill="#eafff3" opacity="0.5"/>
        <circle cx="82" cy="36" r="4.4" fill="#4ade80"/>
      </svg>
      <div style="display:flex;align-items:center;gap:6px;margin-top:24px">
        <span style="font-size:26px;font-weight:800;letter-spacing:1.5px;color:#f0f0f0;font-family:'Syne',system-ui,sans-serif">Padel</span><span style="font-size:26px;font-weight:800;letter-spacing:1.5px;color:#4ade80;font-family:'Syne',system-ui,sans-serif">Hub</span>
      </div>
      <div id="splash-status" style="margin-top:22px;color:#9090a4;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-family:'DM Mono',monospace">Loading…</div>
      <style>
        @keyframes splash-pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
        @keyframes splash-orb-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.10)} }
        @keyframes splash-aura-breath { 0%,100%{transform:scale(0.92);opacity:0.55} 50%{transform:scale(1.18);opacity:0.85} }
        @keyframes splash-orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        #splash-status { animation: splash-pulse 1.5s ease-in-out infinite; }
        .splash-orb   { transform-origin: 50% 50%; transform-box: fill-box; animation: splash-orb-pulse 1.8s ease-in-out infinite; }
        .splash-aura  { transform-origin: 50% 50%; transform-box: fill-box; animation: splash-aura-breath 2.4s ease-in-out infinite; }
        .splash-orbit { animation: splash-orbit 22s linear infinite; }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker registration + update detection
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Check for updates periodically (every 30 minutes)
            setInterval(() => reg.update(), 30 * 60 * 1000);
          }).catch(() => {});
        });
        // Listen for SW_UPDATED message — auto-reload to get new version
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'SW_UPDATED') {
            window.location.reload();
          }
        });
      }
      // Offline detection — update splash status
      window.addEventListener('offline', () => {
        const s = document.getElementById('splash-status');
        if (s) s.textContent = "You're offline. Connect to the internet to continue.";
      });
      // Timeout: if app hasn't loaded after 10s, show error in splash
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash && splash.style.display !== 'none') {
          const s = document.getElementById('splash-status');
          if (s) {
            s.style.animation = 'none';
            s.textContent = 'Taking too long? Tap to reload.';
            s.style.cursor = 'pointer';
            s.style.textDecoration = 'underline';
            s.onclick = () => window.location.reload();
          }
        }
      }, 10000);
    </script>
  </body>
</html>
